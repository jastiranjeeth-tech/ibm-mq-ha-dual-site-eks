name: MQHA EKS CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy-site-a
          - deploy-site-b
          - deploy-both
          - destroy-site-a
          - destroy-site-b
          - destroy-both
      site_a_region:
        description: 'AWS region for site-a'
        required: false
        default: 'us-east-1'
        type: string
      site_b_region:
        description: 'AWS region for site-b'
        required: false
        default: 'us-west-2'
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
  TF_STATE_KEY_PREFIX: mqha-eks
  AWS_RETRY_MODE: adaptive
  AWS_MAX_ATTEMPTS: 10

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'

      - name: Terraform format check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init+validate site-a
        run: |
          terraform -chdir=terraform/sites/site-a init -backend=false
          terraform -chdir=terraform/sites/site-a validate

      - name: Terraform init+validate site-b
        run: |
          terraform -chdir=terraform/sites/site-b init -backend=false
          terraform -chdir=terraform/sites/site-b validate

      - name: Terraform init+validate global-dns
        run: |
          terraform -chdir=terraform/global-dns init -backend=false
          terraform -chdir=terraform/global-dns validate

      - name: Validate Kubernetes YAML syntax
        run: |
          python -m pip install --upgrade pip
          pip install yamllint
          yamllint k8s

      - name: Shell script lint
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

  terraform_plan:
    if: github.event_name != 'workflow_dispatch'
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [site-a, site-b]
        include:
          - site: site-a
            region: us-east-1
          - site: site-b
            region: us-west-2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ matrix.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'

      - name: Terraform Plan for ${{ matrix.site }}
        run: |
          : "${TF_STATE_BUCKET:?Missing repository variable TF_STATE_BUCKET}"
          : "${TF_STATE_REGION:?Missing repository variable TF_STATE_REGION}"
          : "${TF_LOCK_TABLE:?Missing repository variable TF_LOCK_TABLE}"
          terraform -chdir=terraform/sites/${{ matrix.site }} init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PREFIX}/${{ matrix.site }}/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"
          chmod +x import-aws-resources.sh
          ./import-aws-resources.sh ${{ matrix.site }} ${{ matrix.region }}
          terraform -chdir=terraform/sites/${{ matrix.site }} plan

  cd_deploy_site_a_terraform:
    if: github.event_name == 'workflow_dispatch' && (inputs.action == 'deploy-site-a' || inputs.action == 'deploy-both')
    needs: ci
    runs-on: ubuntu-latest
    environment: site-a-approval
    env:
      SITE: site-a
      AWS_REGION: ${{ inputs.site_a_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false

      - name: Terraform Plan for site-a
        run: |
          : "${TF_STATE_BUCKET:?Missing repository variable TF_STATE_BUCKET}"
          : "${TF_STATE_REGION:?Missing repository variable TF_STATE_REGION}"
          : "${TF_LOCK_TABLE:?Missing repository variable TF_LOCK_TABLE}"
          terraform -chdir=terraform/sites/${SITE} init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PREFIX}/${SITE}/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"
          chmod +x import-aws-resources.sh
          ./import-aws-resources.sh ${SITE} ${AWS_REGION}
          terraform -chdir=terraform/sites/${SITE} plan

      - name: Deploy Terraform for site-a
        run: |
          if ! terraform -chdir=terraform/sites/${SITE} apply -auto-approve; then
            echo "Terraform apply failed. Checking for errored.tfstate recovery file..."
            if [ -f "terraform/sites/${SITE}/errored.tfstate" ]; then
              echo "Found errored.tfstate. Pushing recovered state to backend..."
              terraform -chdir=terraform/sites/${SITE} state push errored.tfstate
              echo "State push succeeded. Re-running apply..."
              terraform -chdir=terraform/sites/${SITE} apply -auto-approve
            else
              echo "No errored.tfstate found. Failing step."
              exit 1
            fi
          fi

  cd_deploy_site_a_k8s:
    if: github.event_name == 'workflow_dispatch' && (inputs.action == 'deploy-site-a' || inputs.action == 'deploy-both')
    needs: cd_deploy_site_a_terraform
    runs-on: ubuntu-latest
    env:
      SITE: site-a
      AWS_REGION: ${{ inputs.site_a_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false

      - name: Terraform Init for outputs
        run: |
          : "${TF_STATE_BUCKET:?Missing repository variable TF_STATE_BUCKET}"
          : "${TF_STATE_REGION:?Missing repository variable TF_STATE_REGION}"
          : "${TF_LOCK_TABLE:?Missing repository variable TF_LOCK_TABLE}"
          terraform -chdir=terraform/sites/${SITE} init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PREFIX}/${SITE}/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Grant CI role EKS access for site-a
        run: |
          CLUSTER_NAME=$(terraform -chdir=terraform/sites/${SITE} output -raw cluster_name)
          CALLER_ARN=$(aws sts get-caller-identity --query Arn --output text)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          if [[ "$CALLER_ARN" == arn:aws:sts::*:assumed-role/* ]]; then
            ROLE_NAME=$(echo "$CALLER_ARN" | cut -d'/' -f2)
            PRINCIPAL_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"
          else
            PRINCIPAL_ARN="$CALLER_ARN"
          fi

          echo "Granting EKS access to principal: ${PRINCIPAL_ARN}"
          aws eks create-access-entry \
            --cluster-name "$CLUSTER_NAME" \
            --principal-arn "$PRINCIPAL_ARN" \
            --type STANDARD || true

          aws eks associate-access-policy \
            --cluster-name "$CLUSTER_NAME" \
            --principal-arn "$PRINCIPAL_ARN" \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster || true

          echo "Waiting for EKS access policy association to be visible..."
          for i in {1..12}; do
            POLICY_COUNT=$(aws eks list-associated-access-policies \
              --cluster-name "$CLUSTER_NAME" \
              --principal-arn "$PRINCIPAL_ARN" \
              --query "length(associatedAccessPolicies[?policyArn=='arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy'])" \
              --output text 2>/dev/null || echo 0)

            if [ "$POLICY_COUNT" = "1" ]; then
              echo "EKS access policy association confirmed."
              break
            fi

            echo "Policy not visible yet, retrying... ($i/12)"
            sleep 10
          done

          if [ "$POLICY_COUNT" != "1" ]; then
            echo "ERROR: EKS access policy association not found for ${PRINCIPAL_ARN}"
            exit 1
          fi

      - name: Update kubeconfig
        run: |
          CLUSTER_NAME=$(terraform -chdir=terraform/sites/${SITE} output -raw cluster_name)
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
          kubectl config current-context

          echo "Waiting for Kubernetes RBAC authorization..."
          AUTH_OK="no"
          for i in {1..18}; do
            AUTH_OK=$(kubectl auth can-i create namespaces 2>/dev/null || echo no)
            if [ "$AUTH_OK" = "yes" ]; then
              echo "Kubernetes authorization confirmed."
              break
            fi

            echo "RBAC not ready yet, retrying... ($i/18)"
            sleep 10
          done

          if [ "$AUTH_OK" != "yes" ]; then
            echo "ERROR: kubectl still not authorized for cluster operations"
            exit 1
          fi

      - name: Deploy MQ manifests for site-a
        run: |
          chmod +x scripts/deploy-site-mq-ha.sh
          scripts/deploy-site-mq-ha.sh ${SITE}

      - name: Post-deploy status
        run: |
          kubectl get pods -n ibm-mq
          kubectl get svc -n ibm-mq mq-ha-service

  cd_deploy_site_b_terraform:
    if: github.event_name == 'workflow_dispatch' && (inputs.action == 'deploy-site-b' || inputs.action == 'deploy-both')
    needs: ci
    runs-on: ubuntu-latest
    environment: site-b-approval
    env:
      SITE: site-b
      AWS_REGION: ${{ inputs.site_b_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false

      - name: Terraform Plan for site-b
        run: |
          : "${TF_STATE_BUCKET:?Missing repository variable TF_STATE_BUCKET}"
          : "${TF_STATE_REGION:?Missing repository variable TF_STATE_REGION}"
          : "${TF_LOCK_TABLE:?Missing repository variable TF_LOCK_TABLE}"
          terraform -chdir=terraform/sites/${SITE} init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PREFIX}/${SITE}/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"
          chmod +x import-aws-resources.sh
          ./import-aws-resources.sh ${SITE} ${AWS_REGION}
          terraform -chdir=terraform/sites/${SITE} plan

      - name: Deploy Terraform for site-b
        run: |
          if ! terraform -chdir=terraform/sites/${SITE} apply -auto-approve; then
            echo "Terraform apply failed. Checking for errored.tfstate recovery file..."
            if [ -f "terraform/sites/${SITE}/errored.tfstate" ]; then
              echo "Found errored.tfstate. Pushing recovered state to backend..."
              terraform -chdir=terraform/sites/${SITE} state push errored.tfstate
              echo "State push succeeded. Re-running apply..."
              terraform -chdir=terraform/sites/${SITE} apply -auto-approve
            else
              echo "No errored.tfstate found. Failing step."
              exit 1
            fi
          fi

  cd_deploy_site_b_k8s:
    if: github.event_name == 'workflow_dispatch' && (inputs.action == 'deploy-site-b' || inputs.action == 'deploy-both')
    needs: cd_deploy_site_b_terraform
    runs-on: ubuntu-latest
    env:
      SITE: site-b
      AWS_REGION: ${{ inputs.site_b_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false

      - name: Terraform Init for outputs
        run: |
          : "${TF_STATE_BUCKET:?Missing repository variable TF_STATE_BUCKET}"
          : "${TF_STATE_REGION:?Missing repository variable TF_STATE_REGION}"
          : "${TF_LOCK_TABLE:?Missing repository variable TF_LOCK_TABLE}"
          terraform -chdir=terraform/sites/${SITE} init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PREFIX}/${SITE}/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Grant CI role EKS access for site-b
        run: |
          CLUSTER_NAME=$(terraform -chdir=terraform/sites/${SITE} output -raw cluster_name)
          CALLER_ARN=$(aws sts get-caller-identity --query Arn --output text)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          if [[ "$CALLER_ARN" == arn:aws:sts::*:assumed-role/* ]]; then
            ROLE_NAME=$(echo "$CALLER_ARN" | cut -d'/' -f2)
            PRINCIPAL_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"
          else
            PRINCIPAL_ARN="$CALLER_ARN"
          fi

          echo "Granting EKS access to principal: ${PRINCIPAL_ARN}"
          aws eks create-access-entry \
            --cluster-name "$CLUSTER_NAME" \
            --principal-arn "$PRINCIPAL_ARN" \
            --type STANDARD || true

          aws eks associate-access-policy \
            --cluster-name "$CLUSTER_NAME" \
            --principal-arn "$PRINCIPAL_ARN" \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster || true

          echo "Waiting for EKS access policy association to be visible..."
          for i in {1..12}; do
            POLICY_COUNT=$(aws eks list-associated-access-policies \
              --cluster-name "$CLUSTER_NAME" \
              --principal-arn "$PRINCIPAL_ARN" \
              --query "length(associatedAccessPolicies[?policyArn=='arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy'])" \
              --output text 2>/dev/null || echo 0)

            if [ "$POLICY_COUNT" = "1" ]; then
              echo "EKS access policy association confirmed."
              break
            fi

            echo "Policy not visible yet, retrying... ($i/12)"
            sleep 10
          done

          if [ "$POLICY_COUNT" != "1" ]; then
            echo "ERROR: EKS access policy association not found for ${PRINCIPAL_ARN}"
            exit 1
          fi

      - name: Update kubeconfig
        run: |
          CLUSTER_NAME=$(terraform -chdir=terraform/sites/${SITE} output -raw cluster_name)
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
          kubectl config current-context

          echo "Waiting for Kubernetes RBAC authorization..."
          AUTH_OK="no"
          for i in {1..18}; do
            AUTH_OK=$(kubectl auth can-i create namespaces 2>/dev/null || echo no)
            if [ "$AUTH_OK" = "yes" ]; then
              echo "Kubernetes authorization confirmed."
              break
            fi

            echo "RBAC not ready yet, retrying... ($i/18)"
            sleep 10
          done

          if [ "$AUTH_OK" != "yes" ]; then
            echo "ERROR: kubectl still not authorized for cluster operations"
            exit 1
          fi

      - name: Deploy MQ manifests for site-b
        run: |
          chmod +x scripts/deploy-site-mq-ha.sh
          scripts/deploy-site-mq-ha.sh ${SITE}

      - name: Post-deploy status
        run: |
          kubectl get pods -n ibm-mq
          kubectl get svc -n ibm-mq mq-ha-service

  cd_destroy_site_a:
    if: github.event_name == 'workflow_dispatch' && (inputs.action == 'destroy-site-a' || inputs.action == 'destroy-both')
    runs-on: ubuntu-latest
    environment: site-a-destroy-approval
    env:
      SITE: site-a
      AWS_REGION: ${{ inputs.site_a_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'

      - name: Update kubeconfig
        run: |
          CLUSTER_NAME=$(terraform -chdir=terraform/sites/${SITE} output -raw cluster_name 2>/dev/null || echo "mq-ha-${SITE}")
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION" || true

      - name: Delete MQ resources
        run: |
          kubectl delete -f k8s/${SITE}/ --ignore-not-found=true || true
          kubectl delete namespace ibm-mq --ignore-not-found=true || true

      - name: Terraform Init
        run: |
          : "${TF_STATE_BUCKET:?Missing repository variable TF_STATE_BUCKET}"
          : "${TF_STATE_REGION:?Missing repository variable TF_STATE_REGION}"
          : "${TF_LOCK_TABLE:?Missing repository variable TF_LOCK_TABLE}"
          terraform -chdir=terraform/sites/${SITE} init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PREFIX}/${SITE}/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Show resources to be destroyed
        run: |
          echo "=== Resources that will be DESTROYED for ${SITE} ==="
          terraform -chdir=terraform/sites/${SITE} plan -destroy

      - name: Terraform Destroy for site-a
        run: |
          terraform -chdir=terraform/sites/${SITE} destroy -auto-approve

      - name: Verify destruction - check state file
        run: |
          echo "=== Verifying ${SITE} destruction ==="
          RESOURCE_COUNT=$(terraform -chdir=terraform/sites/${SITE} state list 2>/dev/null | wc -l)
          echo "Remaining resources in state: $RESOURCE_COUNT"
          if [ $RESOURCE_COUNT -gt 0 ]; then
            echo "WARNING: Found remaining resources, running destroy again..."
            terraform -chdir=terraform/sites/${SITE} destroy -auto-approve
            terraform -chdir=terraform/sites/${SITE} state list
          else
            echo "✅ State file is clean - all resources destroyed"
          fi

      - name: Verify AWS resources deleted
        run: |
          echo "=== Checking AWS for remaining resources ==="
          EKS_CLUSTERS=$(aws eks list-clusters --region $AWS_REGION --query 'clusters[?contains(@, `mq-ha`)]' --output text)
          if [ -z "$EKS_CLUSTERS" ]; then
            echo "✅ No EKS clusters found"
          else
            echo "⚠️  Remaining EKS clusters: $EKS_CLUSTERS"
          fi
          
          VPC_COUNT=$(aws ec2 describe-vpcs --region $AWS_REGION --query 'Vpcs[?Tags[?Key==`Name`].Value|contains(@, `mq-ha`)].VpcId' --output text | wc -w)
          echo "VPCs with 'mq-ha' tag: $VPC_COUNT"
          
          NAT_GATEWAYS=$(aws ec2 describe-nat-gateways --region $AWS_REGION --query 'NatGateways[?State==`available`].[NatGatewayId]' --output text | wc -w)
          echo "Active NAT Gateways: $NAT_GATEWAYS"

  cd_destroy_site_b:
    if: github.event_name == 'workflow_dispatch' && (inputs.action == 'destroy-site-b' || inputs.action == 'destroy-both')
    runs-on: ubuntu-latest
    environment: site-b-destroy-approval
    env:
      SITE: site-b
      AWS_REGION: ${{ inputs.site_b_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'

      - name: Update kubeconfig
        run: |
          CLUSTER_NAME=$(terraform -chdir=terraform/sites/${SITE} output -raw cluster_name 2>/dev/null || echo "mq-ha-${SITE}")
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION" || true

      - name: Delete MQ resources
        run: |
          kubectl delete -f k8s/${SITE}/ --ignore-not-found=true || true
          kubectl delete namespace ibm-mq --ignore-not-found=true || true

      - name: Show resources to be destroyed
        run: |
          echo "=== Resources that will be DESTROYED for ${SITE} ==="
          terraform -chdir=terraform/sites/${SITE} plan -destroy

      - name: Terraform Destroy
        run: |
          terraform -chdir=terraform/sites/${SITE} init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PREFIX}/${SITE}/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"
          terraform -chdir=terraform/sites/${SITE} destroy -auto-approve

      - name: Verify destruction - check state file
        run: |
          echo "=== Verifying ${SITE} destruction ==="
          RESOURCE_COUNT=$(terraform -chdir=terraform/sites/${SITE} state list 2>/dev/null | wc -l)
          echo "Remaining resources in state: $RESOURCE_COUNT"
          if [ $RESOURCE_COUNT -gt 0 ]; then
            echo "WARNING: Found remaining resources, running destroy again..."
            terraform -chdir=terraform/sites/${SITE} destroy -auto-approve
            terraform -chdir=terraform/sites/${SITE} state list
          else
            echo "✅ State file is clean - all resources destroyed"
          fi

      - name: Verify AWS resources deleted
        run: |
          echo "=== Checking AWS for remaining resources ==="
          EKS_CLUSTERS=$(aws eks list-clusters --region $AWS_REGION --query 'clusters[?contains(@, `mq-ha`)]' --output text)
          if [ -z "$EKS_CLUSTERS" ]; then
            echo "✅ No EKS clusters found"
          else
            echo "⚠️  Remaining EKS clusters: $EKS_CLUSTERS"
          fi
          
          VPC_COUNT=$(aws ec2 describe-vpcs --region $AWS_REGION --query 'Vpcs[?Tags[?Key==`Name`].Value|contains(@, `mq-ha`)].VpcId' --output text | wc -w)
          echo "VPCs with 'mq-ha' tag: $VPC_COUNT"
          
          NAT_GATEWAYS=$(aws ec2 describe-nat-gateways --region $AWS_REGION --query 'NatGateways[?State==`available`].[NatGatewayId]' --output text | wc -w)
          echo "Active NAT Gateways: $NAT_GATEWAYS"
