apiVersion: v1
kind: ConfigMap
metadata:
  name: mq-ha-config
  namespace: ibm-mq
data:
  qm.ini: |
    NativeHAInstance:
      Name=mq-ha-0
      ReplicationAddress=mq-ha-0.mq-ha-headless.ibm-mq.svc.cluster.local(1414)
    NativeHAInstance:
      Name=mq-ha-1
      ReplicationAddress=mq-ha-1.mq-ha-headless.ibm-mq.svc.cluster.local(1414)
    NativeHAInstance:
      Name=mq-ha-2
      ReplicationAddress=mq-ha-2.mq-ha-headless.ibm-mq.svc.cluster.local(1414)
  mqsc.ini: |
    DEFINE QLOCAL(TEST.QUEUE) REPLACE
    DEFINE QLOCAL(SITEB.IN.QUEUE) REPLACE
    DEFINE QLOCAL(SITEB.OUT.QUEUE) REPLACE
    DEFINE CHANNEL(DEV.APP.SVRCONN) CHLTYPE(SVRCONN) REPLACE
    ALTER CHANNEL(DEV.APP.SVRCONN) CHLTYPE(SVRCONN) MCAUSER('app')
    DEFINE CHANNEL(DEV.ADMIN.SVRCONN) CHLTYPE(SVRCONN) REPLACE
    ALTER QMGR CHLAUTH(DISABLED)
    REFRESH SECURITY TYPE(CONNAUTH)
    * Inter-site DR channels
    DEFINE CHANNEL(SITE.B.TO.A) CHLTYPE(SDR) CONNAME('mq-ha-service.ibm-mq.us-east-1.svc.cluster.local(1414)') REPLACE
    DEFINE CHANNEL(SITE.A.TO.B) CHLTYPE(RCVR) REPLACE
