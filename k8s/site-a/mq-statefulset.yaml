---
apiVersion: v1
kind: Service
metadata:
  name: mq-ha-service
  namespace: ibm-mq
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: mq-ha
  ports:
    - name: qmgr
      port: 1414
      targetPort: 1414
      protocol: TCP
    - name: console
      port: 9443
      targetPort: 9443
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: mq-ha-headless
  namespace: ibm-mq
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: mq-ha
  ports:
    - name: qmgr
      port: 1414
      targetPort: 1414
    - name: console
      port: 9443
      targetPort: 9443
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mq-ha
  namespace: ibm-mq
spec:
  serviceName: mq-ha-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: mq-ha
  template:
    metadata:
      labels:
        app: mq-ha
        site: site-a
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - mq-ha
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: volume-permissions
          image: busybox:latest
          command: ['sh', '-c', 'chown -R 1001:root /mnt/mqm /mnt/mqm-log && chmod -R 775 /mnt/mqm /mnt/mqm-log']
          volumeMounts:
            - name: data
              mountPath: /mnt/mqm
            - name: log
              mountPath: /mnt/mqm-log
      containers:
        - name: mq
          image: icr.io/ibm-messaging/mq:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LICENSE
              value: "accept"
            - name: MQ_QMGR_NAME
              value: "QMHA_A"
            - name: MQ_NATIVE_HA
              value: "true"
            - name: MQ_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mq-ha-secret
                  key: adminPassword
            - name: MQ_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mq-ha-secret
                  key: appPassword
          ports:
            - containerPort: 1414
              name: qmgr
            - containerPort: 9443
              name: console
          volumeMounts:
            - name: data
              mountPath: /mnt/mqm
            - name: log
              mountPath: /mnt/mqm-log
            - name: config
              mountPath: /etc/mqm/20-config.mqsc
              subPath: mqsc.ini
            - name: config
              mountPath: /etc/mqm/qm.ini
              subPath: qm.ini
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            exec:
              command:
                - chkmqhealthy
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 1
          readinessProbe:
            exec:
              command:
                - chkmqready
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 1
      volumes:
        - name: config
          configMap:
            name: mq-ha-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: mq-storage
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: log
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: mq-storage
        resources:
          requests:
            storage: 10Gi
